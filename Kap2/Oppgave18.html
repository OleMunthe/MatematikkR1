<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 400px; /* Maks bredde*/    
}
</style>
</head>


<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En person faller 5,0 meteren i svømmehallen.</p>
        <p> Programkoden skal beregne hvor lang tid det tar fra personen forlater kanten til hun treffer vannet. </p>
        <p><strong>Hva kan stå på linje 6 og 7?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>Linje 6: while s > 5: og Linje 7: a = 9.81 – 0.033*v</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Linje 6: while s > 5: og Linje 7: a = 9.81 + 0.033*v</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Linje 6: while s < 5: og Linje 7: a = 9.81 – 0.033*v</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Linje 6: while s < 5: og Linje 7: a = 9.81 –+ 0.033*v</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

   <div class="box" style="display: grid; place-items: center;">
        <img src="programFall.png" alt="En person som slipper en stein" >
    </div>
</div>


</body>
</html>
