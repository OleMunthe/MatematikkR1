<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

img {
       max-height: 300px; /* Maks høyde */
    max-width: 330px; /* Maks bredde*/    
}
</style>

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>Johanna dødser fra 5 meteren.</p>
        
        <p>Luftmotstanden som virker på henne er proporsjonal med farten, altså \(L = k \cdot v\).</p>

        <p><strong>Hvilken benevning har \(k\)?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\( \frac{\text{Nm}}{\text{s}} \)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>\( \frac{\text{Ns}}{\text{m}} \)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\( \frac{\text{s}}{\text{Nm}} \)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\( \frac{\text{m}}{\text{Ns}} \)</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="5ern.png" alt=" " >
    </div>
</div>


</body>
</html>
