       max-height: 300px; /* Maks høyde */

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>En gass er stengt inne i en beholder med et lokk som kan flytte på seg.</p>
        
        <p>Et stearinlys tilfører en varme \(Q\) = 2,00 kJ til gassen. Gassen bruker energien 0,50 kJ på å dytte lokket oppover.</p>

        <p><strong>Hvor mye endres den termiske energien i gassen?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>0,50 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>1,50 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>2,00 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>2,50 kJ</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

       <div class="box" style="display: grid; place-items: center;">
        <img src="TD1L1.png" alt=" " >
    </div>
</div>


</body>
