<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">

        <p>Vann har en spesifikk varmekapasitet på 4,2 kJ/kg K.</p>

        <p><strong>Hvor mye energi kreves for å varme opp en halvliter med vann fra 30°C til 40°C?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>21 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>42 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>82 kJ</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>164 kJ</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>


</div>
